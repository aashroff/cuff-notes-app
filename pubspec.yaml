name: cuff_notes
description: "CuffNotes - Policing legislation flashcards with spaced repetition"
publish_to: 'none'
version: 1.0.0+8

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  dynamic_color: ^1.7.0
  google_fonts: ^6.2.1
  http: ^1.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.4
  flutter_riverpod: ^2.5.1
  json_annotation: ^4.9.0
  share_plus: ^9.0.0
  url_launcher: ^6.3.1
  flutter_animate: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true
  assets:
    - assets/content/
    - assets/icon/

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/cuffnotes_icon.png"
  adaptive_icon_background: "#0F1629"
  adaptive_icon_foreground: "assets/icon/cuffnotes_icon.png"